spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: unicar-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    validate-on-migrate: false

unicar:
  jwt:
    secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  reserva:
    prazo-resposta: ${RESERVA_PRAZO_RESPOSTA:24h}
    antecedencia-minima-partida: ${RESERVA_ANTECEDENCIA_MINIMA_PARTIDA:1h}
    expiracao:
      intervalo-ms: ${RESERVA_EXPIRACAO_INTERVALO_MS:60000}

eureca:
  url:
    tokens: ${EURECA_TOKENS_URL:https://eureca.sti.ufcg.edu.br/as-sig/tokens}
    estudante: ${EURECA_ESTUDANTE_URL:https://eureca.sti.ufcg.edu.br/das-sig/v1/estudantes/estudante}
    cursos: ${EURECA_CURSOS_URL:https://eureca.sti.ufcg.edu.br/das-sig/v1/cursos}
    profile: ${EURECA_PROFILE_URL:https://eureca.sti.ufcg.edu.br/as-sig/profile}
    professor: ${EURECA_PROFESSOR_URL:https://eureca.sti.ufcg.edu.br/das-sig/v1/professores/professor}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}